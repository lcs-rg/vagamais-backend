services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vagamais
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vagamais
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../../apps/api
      dockerfile: ../../infra/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/vagamais
      DATABASE_USERNAME: postgres
      DATABASE_PASSWORD: vagamais
      JWT_SECRET: dev-secret-change-in-production-minimum-32-chars
      SERVER_PORT: "8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
