name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: ['**']

jobs:
  test-and-push:
    name: Test & Push to ECR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - run: mvn test
      - run: mvn package -DskipTests
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/vagamais-github-actions
          aws-region: sa-east-1
      - uses: aws-actions/amazon-ecr-login@v2
      - name: Build and Push Docker Image
        run: |
          docker build -t vagamais-backend:${{ github.sha }} .
          ECR_URL="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.sa-east-1.amazonaws.com/vagamais-backend"
          docker tag vagamais-backend:${{ github.sha }} "$ECR_URL:${{ github.sha }}"
          docker tag vagamais-backend:${{ github.sha }} "$ECR_URL:latest"
          docker push "$ECR_URL:${{ github.sha }}"
          docker push "$ECR_URL:latest"
